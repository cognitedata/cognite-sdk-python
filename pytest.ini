[pytest]
markers =
    dsl
    coredeps
    us1: User Story 1 — Core Schema Extraction + Primitive Types (PR 1)
    us2: User Story 2 — Extended Type Support (PR 2)
    us3: User Story 3 — Docstring Enrichment + Default Values (PR 3)

anyio_mode = auto

# Format: action:regex:WarningType:module
filterwarnings =
    ignore::UserWarning:cognite.client
    ignore::DeprecationWarning:cognite.client
    ignore::DeprecationWarning:test
    ignore::cognite.client.utils._experimental.FeaturePreviewWarning
    # Raise if we ever see this warning coming from the SDK itself:
    error:You may be trying to combine two \(or more\) filters using 'and' or 'or'.*:UserWarning

testpaths =
    tests
    docs

addopts = --color=yes --doctest-modules --doctest-glob='*.rst'
